<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deltek Intake Form</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f6f3;
      --surface: #ffffff;
      --surface-strong: #f0f4f1;
      --ink: #1d2324;
      --muted: #647071;
      --line: #d8dfda;
      --field: #fbfcfb;
      --primary: #23675a;
      --primary-ink: #ffffff;
      --primary-soft: #dcece6;
      --accent: #a8562a;
      --accent-soft: #f4e4d7;
      --danger: #b3261e;
      --warning: #8a6200;
      --success: #1f6d3d;
      --shadow: 0 18px 45px rgba(27, 35, 36, 0.09);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 16px;
      letter-spacing: 0;
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      background: #172122;
      color: #ffffff;
      border-bottom: 4px solid var(--accent);
    }

    .header-inner {
      width: min(1420px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 20px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      line-height: 1.1;
    }

    .header-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      color: #d5dcda;
      font-size: 14px;
    }

    .meta-pill {
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 999px;
      padding: 6px 10px;
      white-space: nowrap;
    }

    main {
      width: min(1420px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 36px;
      display: grid;
      grid-template-columns: minmax(430px, 0.95fr) minmax(460px, 1.05fr);
      gap: 22px;
      align-items: start;
    }

    .surface {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-strong);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    h2 {
      margin: 0;
      font-size: 19px;
      line-height: 1.2;
    }

    .count-badge {
      min-width: 34px;
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: var(--primary);
      color: var(--primary-ink);
      font-weight: 700;
      padding: 4px 10px;
    }

    form {
      padding: 20px;
    }

    fieldset {
      border: 0;
      padding: 0;
      margin: 0 0 22px;
    }

    legend {
      width: 100%;
      margin: 0 0 12px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
    }

    .type-options {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .type-option {
      position: relative;
      display: block;
    }

    .type-option input {
      position: absolute;
      opacity: 0;
      inset: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      cursor: pointer;
    }

    .type-label {
      min-height: 74px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--field);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
      transition: border-color 120ms ease, background 120ms ease, color 120ms ease;
    }

    .type-title {
      font-weight: 700;
      line-height: 1.15;
    }

    .type-key {
      color: var(--muted);
      font-size: 12px;
    }

    .type-option input:focus-visible + .type-label,
    .type-option input:checked + .type-label {
      border-color: var(--primary);
      background: var(--primary-soft);
      color: #153d37;
      outline: 2px solid transparent;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
      min-width: 0;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-weight: 700;
      color: #273032;
      font-size: 14px;
    }

    .required {
      color: var(--danger);
      font-weight: 700;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 42px;
      border: 1px solid #cbd4ce;
      border-radius: 6px;
      background: var(--field);
      color: var(--ink);
      padding: 9px 10px;
      outline: 0;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(35, 103, 90, 0.18);
      background: #ffffff;
    }

    .vendor-panel {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfaf8;
    }

    .vendor-details {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 2px;
    }

    .detail-box {
      min-height: 58px;
      border: 1px solid #e2d7cc;
      border-radius: 6px;
      background: #ffffff;
      padding: 9px;
      overflow-wrap: anywhere;
    }

    .detail-label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .detail-value {
      font-size: 14px;
      color: var(--ink);
      line-height: 1.25;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      padding-top: 4px;
    }

    .left-actions,
    .right-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .btn {
      min-height: 40px;
      border: 1px solid transparent;
      border-radius: 7px;
      padding: 9px 13px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      max-width: 100%;
    }

    .btn-primary {
      background: var(--primary);
      color: var(--primary-ink);
    }

    .btn-primary:hover {
      background: #1d574c;
    }

    .btn-secondary {
      background: #ffffff;
      border-color: #b9c5be;
      color: #263032;
    }

    .btn-secondary:hover {
      background: #f2f5f2;
    }

    .btn-danger {
      background: #ffffff;
      border-color: #e0b1ad;
      color: var(--danger);
    }

    .btn-danger:hover {
      background: #fff3f1;
    }

    .queue-tools {
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--line);
    }

    .filter-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-group select,
    .filter-group input {
      width: auto;
      min-width: 160px;
    }

    .queue-list {
      display: grid;
      gap: 12px;
      padding: 18px 20px 20px;
    }

    .queue-empty {
      min-height: 160px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      border: 1px dashed #c4cec7;
      border-radius: 8px;
      background: #fbfcfb;
      padding: 22px;
    }

    .queue-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      overflow: hidden;
    }

    .queue-item-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      padding: 14px;
      border-left: 5px solid var(--primary);
    }

    .queue-title {
      font-size: 16px;
      font-weight: 700;
      margin: 0 0 6px;
      overflow-wrap: anywhere;
    }

    .queue-subtitle {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .queue-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .badge {
      border-radius: 999px;
      padding: 5px 8px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      color: #213033;
      background: #eef2ee;
      border: 1px solid #d8dfda;
    }

    .badge.priority-high,
    .badge.status-new {
      background: var(--accent-soft);
      border-color: #e8c5ac;
      color: #5e2f17;
    }

    .badge.status-in-progress {
      background: #fff1ca;
      border-color: #edd584;
      color: var(--warning);
    }

    .badge.status-complete {
      background: #e1f0e5;
      border-color: #b8d9c3;
      color: var(--success);
    }

    .badge.type {
      background: var(--primary-soft);
      border-color: #bdd7ce;
      color: #1e554b;
    }

    .queue-details {
      border-top: 1px solid var(--line);
      padding: 0 14px 14px;
    }

    details {
      margin-top: 12px;
    }

    summary {
      cursor: pointer;
      color: var(--primary);
      font-weight: 700;
      min-height: 34px;
      display: inline-flex;
      align-items: center;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .detail-row {
      border: 1px solid #e4e9e5;
      border-radius: 6px;
      padding: 8px;
      background: #fbfcfb;
      min-width: 0;
    }

    .detail-row.full {
      grid-column: 1 / -1;
    }

    .queue-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 14px 14px;
    }

    .mini-btn {
      min-height: 34px;
      padding: 7px 10px;
      font-size: 13px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: min(420px, calc(100vw - 36px));
      background: #172122;
      color: #ffffff;
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 12px 14px;
      transform: translateY(16px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
      z-index: 10;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1120px) {
      main {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .header-inner {
        width: min(100% - 20px, 1420px);
        align-items: flex-start;
        flex-direction: column;
      }

      main {
        width: min(100% - 20px, 1420px);
        padding-top: 16px;
      }

      .type-options,
      .form-grid,
      .vendor-panel,
      .vendor-details,
      .detail-grid {
        grid-template-columns: 1fr;
      }

      .field.full,
      .vendor-details,
      .detail-row.full {
        grid-column: auto;
      }

      .section-header,
      .queue-tools,
      .actions {
        align-items: stretch;
        flex-direction: column;
      }

      .left-actions,
      .right-actions,
      .filter-group {
        width: 100%;
      }

      .btn,
      .filter-group select,
      .filter-group input {
        width: 100%;
      }

      .queue-item-head {
        grid-template-columns: 1fr;
      }

      .queue-badges {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <div class="header-inner">
        <h1>Deltek Intake Form</h1>
        <div class="header-meta" aria-label="Queue summary">
          <span class="meta-pill" id="newCount">New: 0</span>
          <span class="meta-pill" id="progressCount">In Progress: 0</span>
          <span class="meta-pill" id="completeCount">Complete: 0</span>
        </div>
      </div>
    </header>

    <main>
      <section class="surface" aria-labelledby="intakeHeading">
        <div class="section-header">
          <h2 id="intakeHeading">Intake</h2>
        </div>

        <form id="intakeForm" novalidate>
          <fieldset>
            <legend>Request Type</legend>
            <div class="type-options" id="typeOptions"></div>
          </fieldset>

          <fieldset id="commonFieldset" hidden>
            <legend>Request Details</legend>
            <div class="form-grid" id="commonFields"></div>
          </fieldset>

          <fieldset id="specificFieldset" hidden>
            <legend id="specificLegend">Required Information</legend>
            <div class="form-grid" id="specificFields"></div>
          </fieldset>

          <fieldset id="vendorFieldset" hidden>
            <legend>Vendor Lookup</legend>
            <div class="vendor-panel">
              <div class="field">
                <label for="vendorSearch">Vendor search</label>
                <input id="vendorSearch" name="vendorSearch" type="search" autocomplete="off">
              </div>
              <div class="field">
                <label for="vendorId">Vendor <span class="required">*</span></label>
                <select id="vendorId" name="vendorId"></select>
              </div>
              <div class="vendor-details" id="vendorDetails" aria-live="polite"></div>
            </div>
          </fieldset>

          <div class="actions" id="formActions" hidden>
            <div class="left-actions">
              <button type="submit" class="btn btn-primary">Add to Queue</button>
              <button type="button" class="btn btn-secondary" id="resetForm">Reset Form</button>
            </div>
            <div class="right-actions">
              <button type="button" class="btn btn-secondary" id="fillSample">Sample Data</button>
            </div>
          </div>
        </form>
      </section>

      <section class="surface" aria-labelledby="queueHeading">
        <div class="section-header">
          <h2 id="queueHeading">Work Queue</h2>
          <span class="count-badge" id="queueCount">0</span>
        </div>

        <div class="queue-tools">
          <div class="filter-group">
            <label for="queueStatusFilter">Status</label>
            <select id="queueStatusFilter">
              <option value="All">All</option>
              <option value="New">New</option>
              <option value="In Progress">In Progress</option>
              <option value="Complete">Complete</option>
            </select>
            <label for="queueTypeFilter">Type</label>
            <select id="queueTypeFilter">
              <option value="All">All</option>
              <option value="Opportunity">Opportunity</option>
              <option value="Promo">Promo</option>
              <option value="Project">Project</option>
              <option value="Supplier PO">Supplier PO</option>
            </select>
          </div>
          <div class="filter-group">
            <button type="button" class="btn btn-secondary" id="exportQueue">Export CSV</button>
            <button type="button" class="btn btn-danger" id="clearComplete">Clear Complete</button>
          </div>
        </div>

        <div class="queue-list" id="queueList"></div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const intakeTypes = [
      { key: "Opportunity", short: "OPP" },
      { key: "Promo", short: "PRM" },
      { key: "Project", short: "PRJ" },
      { key: "Supplier PO", short: "PO" }
    ];

    const vendors = [
      { id: "V-10014", name: "Acme Promotional Products", category: "Promotional", contact: "orders@acmepromo.example", terms: "Net 30", status: "Active" },
      { id: "V-10208", name: "Brightline Print Services", category: "Print", contact: "accounting@brightline.example", terms: "Net 15", status: "Active" },
      { id: "V-10442", name: "Compass Office Supply", category: "Office Supply", contact: "support@compass.example", terms: "Net 30", status: "Active" },
      { id: "V-10719", name: "Northstar Technical Staffing", category: "Professional Services", contact: "deltek@northstar.example", terms: "Net 45", status: "Active" },
      { id: "V-11063", name: "Summit Hardware and Safety", category: "Materials", contact: "sales@summiths.example", terms: "Net 30", status: "Active" },
      { id: "V-11501", name: "Keystone Logistics", category: "Freight", contact: "dispatch@keystone.example", terms: "Net 20", status: "Active" },
      { id: "V-11877", name: "Harbor Event Rentals", category: "Events", contact: "team@harborrentals.example", terms: "Due on receipt", status: "Active" },
      { id: "V-12005", name: "Pinnacle Software Group", category: "Software", contact: "billing@pinnaclesg.example", terms: "Annual", status: "Active" }
    ];

    const commonFields = [
      { name: "requestTitle", label: "Request title", type: "text", required: true, full: true },
      { name: "requestedBy", label: "Requested by", type: "text", required: true },
      { name: "department", label: "Department", type: "text", required: true },
      { name: "needBy", label: "Need by", type: "date", required: true },
      { name: "priority", label: "Priority", type: "select", required: true, options: ["Normal", "High", "Low"] },
      { name: "notes", label: "Notes", type: "textarea", required: false, full: true }
    ];

    const specificFields = {
      "Opportunity": [
        { name: "opportunityName", label: "Opportunity name", type: "text", required: true },
        { name: "customer", label: "Customer", type: "text", required: true },
        { name: "estimatedValue", label: "Estimated value", type: "number", required: true, min: "0", step: "0.01" },
        { name: "expectedCloseDate", label: "Expected close date", type: "date", required: true },
        { name: "captureManager", label: "Capture manager", type: "text", required: true },
        { name: "deltekOpportunityId", label: "Deltek opportunity ID", type: "text", required: false }
      ],
      "Promo": [
        { name: "campaignName", label: "Campaign or event", type: "text", required: true },
        { name: "itemDescription", label: "Item description", type: "text", required: true },
        { name: "quantity", label: "Quantity", type: "number", required: true, min: "1", step: "1" },
        { name: "inHandsDate", label: "In-hands date", type: "date", required: true },
        { name: "budget", label: "Budget", type: "number", required: true, min: "0", step: "0.01" },
        { name: "shipTo", label: "Ship to", type: "text", required: true, full: true }
      ],
      "Project": [
        { name: "projectName", label: "Project name", type: "text", required: true },
        { name: "projectManager", label: "Project manager", type: "text", required: true },
        { name: "clientName", label: "Client", type: "text", required: true },
        { name: "startDate", label: "Start date", type: "date", required: true },
        { name: "projectCode", label: "Project or charge code", type: "text", required: true },
        { name: "contractType", label: "Contract type", type: "select", required: true, options: ["Firm Fixed Price", "Time and Materials", "Cost Plus", "Internal"] }
      ],
      "Supplier PO": [
        { name: "poDescription", label: "PO description", type: "text", required: true, full: true },
        { name: "amount", label: "Amount", type: "number", required: true, min: "0", step: "0.01" },
        { name: "buyer", label: "Buyer", type: "text", required: true },
        { name: "deliveryDate", label: "Delivery date", type: "date", required: true },
        { name: "deliverTo", label: "Deliver to", type: "text", required: true },
        { name: "glOrProjectCode", label: "GL or project code", type: "text", required: true }
      ]
    };

    const typesRequiringVendor = new Set(["Promo", "Supplier PO"]);
    const queueStorageKey = "deltek-intake-queue-v1";

    const form = document.getElementById("intakeForm");
    const typeOptions = document.getElementById("typeOptions");
    const commonFieldset = document.getElementById("commonFieldset");
    const commonFieldsContainer = document.getElementById("commonFields");
    const specificFieldset = document.getElementById("specificFieldset");
    const specificFieldsContainer = document.getElementById("specificFields");
    const specificLegend = document.getElementById("specificLegend");
    const formActions = document.getElementById("formActions");
    const vendorFieldset = document.getElementById("vendorFieldset");
    const vendorSearch = document.getElementById("vendorSearch");
    const vendorSelect = document.getElementById("vendorId");
    const vendorDetails = document.getElementById("vendorDetails");
    const queueList = document.getElementById("queueList");
    const queueCount = document.getElementById("queueCount");
    const queueStatusFilter = document.getElementById("queueStatusFilter");
    const queueTypeFilter = document.getElementById("queueTypeFilter");
    const toast = document.getElementById("toast");

    let selectedType = "";
    let queue = loadQueue();
    let toastTimer = null;

    function initialize() {
      renderTypeOptions();
      renderFieldList(commonFields, commonFieldsContainer);
      renderSpecificFields();
      renderVendorOptions();
      renderVendorDetails();
      renderQueue();

      form.addEventListener("submit", handleSubmit);
      document.getElementById("resetForm").addEventListener("click", resetForm);
      document.getElementById("fillSample").addEventListener("click", fillSampleData);
      vendorSearch.addEventListener("input", renderVendorOptions);
      vendorSelect.addEventListener("change", renderVendorDetails);
      queueStatusFilter.addEventListener("change", renderQueue);
      queueTypeFilter.addEventListener("change", renderQueue);
      document.getElementById("exportQueue").addEventListener("click", exportQueue);
      document.getElementById("clearComplete").addEventListener("click", clearComplete);
    }

    function renderTypeOptions() {
      typeOptions.innerHTML = "";
      intakeTypes.forEach((type) => {
        const wrapper = document.createElement("label");
        wrapper.className = "type-option";

        const input = document.createElement("input");
        input.type = "radio";
        input.name = "intakeType";
        input.value = type.key;
        input.required = true;
        input.checked = type.key === selectedType;
        input.addEventListener("change", () => {
          selectedType = type.key;
          renderSpecificFields();
        });

        const label = document.createElement("span");
        label.className = "type-label";
        label.innerHTML = `<span class="type-title">${escapeHtml(type.key)}</span><span class="type-key">${escapeHtml(type.short)}</span>`;

        wrapper.append(input, label);
        typeOptions.appendChild(wrapper);
      });
    }

    function renderFieldList(fields, container) {
      container.innerHTML = "";
      fields.forEach((field) => {
        container.appendChild(createField(field));
      });
    }

    function createField(field) {
      const wrapper = document.createElement("div");
      wrapper.className = field.full ? "field full" : "field";

      const label = document.createElement("label");
      label.setAttribute("for", field.name);
      label.innerHTML = `${escapeHtml(field.label)}${field.required ? ' <span class="required">*</span>' : ""}`;

      let input;
      if (field.type === "textarea") {
        input = document.createElement("textarea");
      } else if (field.type === "select") {
        input = document.createElement("select");
        field.options.forEach((option) => {
          const optionElement = document.createElement("option");
          optionElement.value = option;
          optionElement.textContent = option;
          input.appendChild(optionElement);
        });
      } else {
        input = document.createElement("input");
        input.type = field.type;
      }

      input.id = field.name;
      input.name = field.name;
      input.required = Boolean(field.required);

      if (field.min !== undefined) input.min = field.min;
      if (field.step !== undefined) input.step = field.step;

      wrapper.append(label, input);
      return wrapper;
    }

    function renderSpecificFields() {
      if (!selectedType) {
        commonFieldset.hidden = true;
        specificFieldset.hidden = true;
        vendorFieldset.hidden = true;
        formActions.hidden = true;
        vendorSelect.required = false;
        specificFieldsContainer.innerHTML = "";
        specificLegend.textContent = "Required Information";
        return;
      }

      commonFieldset.hidden = false;
      specificFieldset.hidden = false;
      formActions.hidden = false;
      specificLegend.textContent = `${selectedType} Required Information`;
      renderFieldList(specificFields[selectedType], specificFieldsContainer);

      const needsVendor = typesRequiringVendor.has(selectedType);
      vendorFieldset.hidden = !needsVendor;
      vendorSelect.required = needsVendor;
      vendorSearch.value = "";
      renderVendorOptions();
      renderVendorDetails();
    }

    function renderVendorOptions() {
      const searchTerm = vendorSearch.value.trim().toLowerCase();
      const filteredVendors = vendors.filter((vendor) => {
        return [vendor.id, vendor.name, vendor.category, vendor.contact].some((value) => {
          return value.toLowerCase().includes(searchTerm);
        });
      });

      const currentValue = vendorSelect.value;
      vendorSelect.innerHTML = "";

      const blankOption = document.createElement("option");
      blankOption.value = "";
      blankOption.textContent = "Select vendor";
      vendorSelect.appendChild(blankOption);

      filteredVendors.forEach((vendor) => {
        const option = document.createElement("option");
        option.value = vendor.id;
        option.textContent = `${vendor.name} (${vendor.id})`;
        vendorSelect.appendChild(option);
      });

      if (filteredVendors.some((vendor) => vendor.id === currentValue)) {
        vendorSelect.value = currentValue;
      }
    }

    function renderVendorDetails() {
      const vendor = getSelectedVendor();
      const detailData = vendor
        ? [
          ["Vendor ID", vendor.id],
          ["Category", vendor.category],
          ["Contact", vendor.contact],
          ["Terms", vendor.terms]
        ]
        : [
          ["Vendor ID", "-"],
          ["Category", "-"],
          ["Contact", "-"],
          ["Terms", "-"]
        ];

      vendorDetails.innerHTML = detailData.map(([label, value]) => `
        <div class="detail-box">
          <span class="detail-label">${escapeHtml(label)}</span>
          <span class="detail-value">${escapeHtml(value)}</span>
        </div>
      `).join("");
    }

    function handleSubmit(event) {
      event.preventDefault();

      if (!selectedType) {
        showToast("Select a request type.");
        return;
      }

      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }

      const formData = new FormData(form);
      const vendor = getSelectedVendor();
      const request = {
        id: createId(selectedType),
        type: selectedType,
        status: "New",
        createdAt: new Date().toISOString(),
        vendor: vendor || null,
        details: {}
      };

      [...commonFields, ...specificFields[selectedType]].forEach((field) => {
        request.details[field.name] = formData.get(field.name) || "";
      });

      queue.unshift(request);
      saveQueue();
      renderQueue();
      resetForm();
      showToast("Request added to the work queue.");
    }

    function resetForm() {
      form.reset();
      selectedType = "";
      renderTypeOptions();
      renderSpecificFields();
    }

    function fillSampleData() {
      resetForm();
      const today = new Date();
      const needBy = addDays(today, 10);
      const closeDate = addDays(today, 45);

      selectedType = "Supplier PO";
      renderTypeOptions();
      renderSpecificFields();

      setValue("requestTitle", "Safety equipment order");
      setValue("requestedBy", "Jordan Lee");
      setValue("department", "Operations");
      setValue("needBy", formatDate(needBy));
      setValue("priority", "High");
      setValue("notes", "Please route to purchasing after validation.");
      setValue("vendorId", "V-11063");
      renderVendorDetails();
      setValue("poDescription", "Replacement PPE and field safety supplies");
      setValue("amount", "2850.00");
      setValue("buyer", "Taylor Morgan");
      setValue("deliveryDate", formatDate(closeDate));
      setValue("deliverTo", "Richmond field office");
      setValue("glOrProjectCode", "OPS-4521");
    }

    function setValue(id, value) {
      const element = document.getElementById(id);
      if (element) element.value = value;
    }

    function loadQueue() {
      try {
        const stored = localStorage.getItem(queueStorageKey);
        return stored ? JSON.parse(stored) : [];
      } catch (error) {
        return [];
      }
    }

    function saveQueue() {
      localStorage.setItem(queueStorageKey, JSON.stringify(queue));
    }

    function renderQueue() {
      const statusFilter = queueStatusFilter.value;
      const typeFilter = queueTypeFilter.value;
      const filteredQueue = queue.filter((item) => {
        const statusMatches = statusFilter === "All" || item.status === statusFilter;
        const typeMatches = typeFilter === "All" || item.type === typeFilter;
        return statusMatches && typeMatches;
      });

      updateCounts();
      queueCount.textContent = String(filteredQueue.length);

      if (!filteredQueue.length) {
        queueList.innerHTML = '<div class="queue-empty">No queue items match the current filters.</div>';
        return;
      }

      queueList.innerHTML = filteredQueue.map(renderQueueItem).join("");

      queueList.querySelectorAll("[data-action]").forEach((button) => {
        button.addEventListener("click", handleQueueAction);
      });
    }

    function renderQueueItem(item) {
      const title = item.details.requestTitle || `${item.type} request`;
      const vendorLine = item.vendor ? `Vendor: ${item.vendor.name}` : "No vendor lookup";
      const created = formatDateTime(item.createdAt);
      const priorityClass = item.details.priority === "High" ? "priority-high" : "";
      const statusClass = `status-${item.status.toLowerCase().replaceAll(" ", "-")}`;
      const detailRows = buildDetailRows(item);

      return `
        <article class="queue-item">
          <div class="queue-item-head">
            <div>
              <h3 class="queue-title">${escapeHtml(title)}</h3>
              <div class="queue-subtitle">${escapeHtml(item.id)} | ${escapeHtml(created)} | ${escapeHtml(vendorLine)}</div>
            </div>
            <div class="queue-badges">
              <span class="badge type">${escapeHtml(item.type)}</span>
              <span class="badge ${escapeHtml(priorityClass)}">${escapeHtml(item.details.priority || "Normal")}</span>
              <span class="badge ${escapeHtml(statusClass)}">${escapeHtml(item.status)}</span>
            </div>
          </div>
          <div class="queue-details">
            <details>
              <summary>Details</summary>
              <div class="detail-grid">${detailRows}</div>
            </details>
          </div>
          <div class="queue-actions">
            <button type="button" class="btn btn-secondary mini-btn" data-action="progress" data-id="${escapeHtml(item.id)}">In Progress</button>
            <button type="button" class="btn btn-secondary mini-btn" data-action="complete" data-id="${escapeHtml(item.id)}">Complete</button>
            <button type="button" class="btn btn-danger mini-btn" data-action="delete" data-id="${escapeHtml(item.id)}">Delete</button>
          </div>
        </article>
      `;
    }

    function buildDetailRows(item) {
      const fields = [...commonFields, ...specificFields[item.type]];
      const rows = fields.map((field) => {
        const value = item.details[field.name] || "-";
        const fullClass = field.full || field.type === "textarea" ? " full" : "";
        return `
          <div class="detail-row${fullClass}">
            <span class="detail-label">${escapeHtml(field.label)}</span>
            <span class="detail-value">${escapeHtml(value)}</span>
          </div>
        `;
      });

      if (item.vendor) {
        rows.push(`
          <div class="detail-row full">
            <span class="detail-label">Vendor</span>
            <span class="detail-value">${escapeHtml(item.vendor.name)} (${escapeHtml(item.vendor.id)}) | ${escapeHtml(item.vendor.contact)}</span>
          </div>
        `);
      }

      return rows.join("");
    }

    function handleQueueAction(event) {
      const id = event.currentTarget.dataset.id;
      const action = event.currentTarget.dataset.action;
      const index = queue.findIndex((item) => item.id === id);
      if (index === -1) return;

      if (action === "progress") {
        queue[index].status = "In Progress";
        showToast("Queue item marked In Progress.");
      }

      if (action === "complete") {
        queue[index].status = "Complete";
        showToast("Queue item marked Complete.");
      }

      if (action === "delete") {
        queue.splice(index, 1);
        showToast("Queue item deleted.");
      }

      saveQueue();
      renderQueue();
    }

    function clearComplete() {
      const before = queue.length;
      queue = queue.filter((item) => item.status !== "Complete");
      saveQueue();
      renderQueue();
      showToast(`${before - queue.length} completed item(s) cleared.`);
    }

    function exportQueue() {
      if (!queue.length) {
        showToast("There are no queue items to export.");
        return;
      }

      const headers = [
        "id",
        "type",
        "status",
        "createdAt",
        "requestTitle",
        "requestedBy",
        "department",
        "needBy",
        "priority",
        "vendorId",
        "vendorName",
        "details"
      ];

      const rows = queue.map((item) => {
        return [
          item.id,
          item.type,
          item.status,
          item.createdAt,
          item.details.requestTitle || "",
          item.details.requestedBy || "",
          item.details.department || "",
          item.details.needBy || "",
          item.details.priority || "",
          item.vendor ? item.vendor.id : "",
          item.vendor ? item.vendor.name : "",
          JSON.stringify(item.details)
        ];
      });

      const csv = [headers, ...rows]
        .map((row) => row.map(escapeCsvValue).join(","))
        .join("\n");

      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `deltek-intake-queue-${formatDate(new Date())}.csv`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      showToast("Queue exported as CSV.");
    }

    function updateCounts() {
      const counts = queue.reduce((summary, item) => {
        summary[item.status] = (summary[item.status] || 0) + 1;
        return summary;
      }, {});

      document.getElementById("newCount").textContent = `New: ${counts["New"] || 0}`;
      document.getElementById("progressCount").textContent = `In Progress: ${counts["In Progress"] || 0}`;
      document.getElementById("completeCount").textContent = `Complete: ${counts["Complete"] || 0}`;
    }

    function getSelectedVendor() {
      return vendors.find((vendor) => vendor.id === vendorSelect.value) || null;
    }

    function createId(type) {
      const prefix = intakeTypes.find((item) => item.key === type).short;
      const timestamp = Date.now().toString(36).toUpperCase();
      const random = Math.random().toString(36).slice(2, 6).toUpperCase();
      return `${prefix}-${timestamp}-${random}`;
    }

    function addDays(date, days) {
      const copy = new Date(date);
      copy.setDate(copy.getDate() + days);
      return copy;
    }

    function formatDate(date) {
      return date.toISOString().slice(0, 10);
    }

    function formatDateTime(value) {
      const date = new Date(value);
      return new Intl.DateTimeFormat("en-US", {
        month: "short",
        day: "2-digit",
        year: "numeric",
        hour: "numeric",
        minute: "2-digit"
      }).format(date);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeCsvValue(value) {
      const stringValue = String(value ?? "");
      return `"${stringValue.replaceAll('"', '""')}"`;
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove("show");
      }, 2600);
    }

    initialize();
  </script>
</body>
</html>
